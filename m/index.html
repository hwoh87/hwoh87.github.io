<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>사주·궁합 매거진 | 만세력</title>

  <!-- 카톡/인스타/메신저 리치 미리보기 (Open Graph) -->
  <meta property="og:type" content="article" />
  <meta property="og:site_name" content="만세력" />
  <meta property="og:title" content="사주로 보는 오늘의 이야기 | 만세력" />
  <meta property="og:description" content="연예인 사주·궁합부터 내 사주 칼럼까지. 앱에서 전체 내용을 확인하세요." />
  <meta property="og:image" content="https://hwoh87.github.io/og-magazine.png" />
  <meta property="og:url" content="https://hwoh87.github.io/m/" />
  <meta name="twitter:card" content="summary_large_image" />

  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0; min-height: 100vh; box-sizing: border-box;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px;
      font-family: -apple-system, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: #0A0820; color: #EDEBF5; text-align: center; padding: 32px;
    }
    .logo { font-size: 44px; }
    h1 { font-size: 20px; font-weight: 700; margin: 0; }
    p { font-size: 14px; line-height: 1.6; color: #B8B2D6; margin: 0; max-width: 320px; }
    a.cta {
      display: inline-block; margin-top: 6px; padding: 14px 28px; border-radius: 999px;
      background: #7C5CFF; color: #fff; font-weight: 700; text-decoration: none; font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="logo">🔮</div>
  <h1>만세력 매거진</h1>
  <p>앱에서 전체 내용을 확인할 수 있어요.<br />잠시 후 자동으로 이동합니다…</p>
  <a id="cta" class="cta" href="#">앱에서 보기</a>

  <script>
    (function () {
      var PKG = 'com.samramanshang.manseryeok';
      var params = new URLSearchParams(location.search);
      var id = params.get('id');
      // 경로형(/m/123)도 지원 — 향후 정적 페이지 생성 시.
      if (!id) { var m = location.pathname.match(/\/m\/(\d+)/); if (m) id = m[1]; }

      var ref = id ? ('&referrer=' + encodeURIComponent('m_' + id)) : '';
      var STORE = 'https://play.google.com/store/apps/details?id=' + PKG + ref;
      var SCHEME = id ? ('ohhyo://magazine/' + id) : null;

      document.getElementById('cta').setAttribute('href', STORE);

      function toStore() { location.href = STORE; }

      // 앱이 설치돼 있으면 커스텀 스킴이 앱을 열고 이 페이지는 백그라운드로 전환 → 스토어 이동 취소.
      // (검증된 App Link 라면 이 페이지 자체가 안 뜨고 앱이 곧장 열린다.)
      if (SCHEME) {
        var timer = setTimeout(toStore, 1500);
        document.addEventListener('visibilitychange', function () {
          if (document.hidden) clearTimeout(timer);
        });
        location.href = SCHEME;
      } else {
        setTimeout(toStore, 800);
      }
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>사주 AI 융합 리포트가 도착했어요 | 만세력</title>

  <!-- 종류별 OG 셸 — OG 크롤러는 JS 를 실행하지 않으므로, 정적 호스팅에서 가능한 최대치인
       "리포트 종류별" 미리보기(제목·설명·이미지)를 여기서 제공한다. 사람 브라우저는 즉시
       공용 뷰어(../?sid=)로 넘긴다. 설치자는 App Links 가 이 URL 자체를 가로채 앱으로 직행. -->
  <meta property="og:type" content="article" />
  <meta property="og:site_name" content="만세력" />
  <meta property="og:title" content="사주 AI 융합 리포트가 도착했어요" />
  <meta property="og:description" content="사주 · 자미두수 · 별자리, 세 시선을 하나로 엮은 AI 심층 리포트예요. 링크에서 전체 풀이를 읽을 수 있어요." />
  <meta property="og:image" content="https://hwoh87.github.io/og-fusion.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:url" content="https://hwoh87.github.io/s/fusion/" />
  <meta name="twitter:card" content="summary_large_image" />

  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #0A0820; color: #B8B2D6; font-size: 14px;
      font-family: -apple-system, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }
    a { color: #C9B2FF; }
  </style>
</head>
<body>
  <p>리포트로 이동 중이에요… <a id="go" href="../">열리지 않으면 여기를 눌러주세요</a></p>
  <script>
    (function () {
      var to = '../' + location.search;
      document.getElementById('go').setAttribute('href', to);
      location.replace(to);
    })();
  </script>
</body>
</html>

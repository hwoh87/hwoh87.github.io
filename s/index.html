<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>궁합 결과 | 만세력</title>

  <!-- 카톡/인스타/메신저 리치 미리보기 (Open Graph) -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="만세력" />
  <meta property="og:title" content="우리 궁합, 앱에서 확인해보세요 | 만세력" />
  <meta property="og:description" content="사주로 보는 궁합 점수와 풀이. 만세력 앱에서 내 사주로 직접 확인하세요." />
  <meta property="og:image" content="https://hwoh87.github.io/og-share.png" />
  <meta property="og:url" content="https://hwoh87.github.io/s/" />
  <meta name="twitter:card" content="summary_large_image" />

  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0; min-height: 100vh; box-sizing: border-box;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px;
      font-family: -apple-system, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: #0A0820; color: #EDEBF5; text-align: center; padding: 32px;
    }
    .logo { font-size: 44px; }
    h1 { font-size: 20px; font-weight: 700; margin: 0; }
    p { font-size: 14px; line-height: 1.6; color: #B8B2D6; margin: 0; max-width: 320px; }
    a.cta {
      display: inline-block; margin-top: 6px; padding: 14px 28px; border-radius: 999px;
      background: #7C5CFF; color: #fff; font-weight: 700; text-decoration: none; font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="logo">💞</div>
  <h1>만세력 궁합</h1>
  <p>내 사주로 직접 궁합을 확인할 수 있어요.<br />잠시 후 자동으로 이동합니다…</p>
  <a id="cta" class="cta" href="#">앱에서 보기</a>

  <script>
    (function () {
      var PKG = 'com.samramanshang.manseryeok';
      var params = new URLSearchParams(location.search);
      var scene = params.get('scene');
      // 경로형(/s/one-to-one)도 지원.
      if (!scene) { var m = location.pathname.match(/\/s\/([a-z-]+)/); if (m) scene = m[1]; }

      var ref = scene ? ('&referrer=' + encodeURIComponent('s_' + scene)) : '';
      var STORE = 'https://play.google.com/store/apps/details?id=' + PKG + ref;
      var SCHEME = scene ? ('ohhyo://share/' + scene) : null;

      document.getElementById('cta').setAttribute('href', STORE);

      function toStore() { location.href = STORE; }

      if (SCHEME) {
        var timer = setTimeout(toStore, 1500);
        document.addEventListener('visibilitychange', function () {
          if (document.hidden) clearTimeout(timer);
        });
        location.href = SCHEME;
      } else {
        setTimeout(toStore, 800);
      }
    })();
  </script>
</body>
</html>
